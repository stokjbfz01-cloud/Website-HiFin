<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="HandheldFriendly" content="true">
    <title>Lumina AI - Cinematic Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/chat-support.css">
</head>
<body>

    <div class="noise-filter"></div>
    <div class="ambient-engine">
        <div class="gradient-canvas"></div>
        <div class="grid-layer"></div>
    </div>

    <div id="admin-hud" class="admin-hud">
        ● Beralih Ke Mode Admin. Tunggu Beberapa Detik sampai admin kami membalas Respon anda...
    </div>

    <header>
        <div class="brand-container">
            <div class="profile-avatar">
    <img src="../assets/IMG/profil.png" alt="Profile">
</div>
<div class="brand-text">
    <h1 id="brandName">LUMINA<span>.AI</span></h1>
</div>

        </div>
        <div class="mode-control" id="modeToggle">
            <div class="selector-pill"></div>
            <div class="mode-label active-label" id="lblAi">AI MODE</div>
            <div class="mode-label" id="lblAdmin">ADMIN MODE</div>
            <span id="admin-notif-badge" class="admin-notif-badge hidden">!</span>
        </div>
    </header>

    <main id="chat-scroller">
        <div class="hero-section" id="hero">
            <div class="support-icon">
    <i class="fa-solid fa-headset"></i>
</div>
            <h2 class="hero-title">HiFin Support</h2>
            <p class="hero-subtitle">Memberikan jawaban mengenai semua pertanyaan yang anda ingin tanyakan dengan instan.</p>
        </div>
    </main>

    <div class="indicator-box" id="ai-status">
        <div class="wave-anim">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <span id="status-text" style="font-size: 0.75rem; font-weight: 800; color: var(--accent-red); letter-spacing: 1.5px;">PROCESSING MODULE...</span>
    </div>

    <div class="dock-container">
        <div class="dock-glass">
            <textarea id="userInput" placeholder="Ketik pertanyaan mu disini..." rows="1" spellcheck="false"></textarea>
            <button class="send-pill" id="sendBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../assets/js/chat-support.js"></script>
</body>
</html>
